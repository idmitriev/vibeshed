name: Vibeshed
options:
  bundleIdPrefix: com.ivandmitriev
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  groupSortPosition: top

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Yams:
    url: https://github.com/jpsim/Yams
    from: "6.0.0"
  SwiftLintPlugins:
    url: https://github.com/SimplyDanny/SwiftLintPlugins
    from: "0.58.0"
  SwiftFormat:
    url: https://github.com/nicklockwood/SwiftFormat
    from: "0.55.0"

targets:
  Vibeshed:
    type: application
    platform: macOS
    sources:
      - path: Vibeshed
        excludes:
          - Info.plist
    dependencies:
      - package: KeyboardShortcuts
      - package: Yams
    info:
      path: Vibeshed/Info.plist
      properties:
        LSUIElement: true
        CFBundleIconFile: AppIcon
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - vibeshed
            CFBundleURLName: com.ivandmitriev.Vibeshed.url
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: com.ivandmitriev.Vibeshed
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_APP_SANDBOX: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"

  VibeshedUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: VibeshedUITests
    dependencies:
      - target: Vibeshed
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        TEST_TARGET_NAME: Vibeshed
        GENERATE_INFOPLIST_FILE: YES
