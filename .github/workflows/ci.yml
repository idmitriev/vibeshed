name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode.app
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Lint
        run: |
          SWIFTLINT=.build/artifacts/swiftlintplugins/SwiftLintBinary/SwiftLintBinary.artifactbundle/macos/swiftlint
          if [ -x "$SWIFTLINT" ]; then "$SWIFTLINT" lint --strict --reporter github-actions-logging; else echo "SwiftLint binary not found, skipping"; fi
