# ~/.config/vibeshed/config.yaml
# Vibeshed — macOS launcher configuration
# Copy this file to ~/.config/vibeshed/config.yaml and customize.

appearance:
  panelWidth: 720
  panelHeight: 480
  cornerRadius: 12
  themeIntensity: 0.8       # 0 = off, 0.3+ bg tint, 0.6+ icon tint, 0.8+ glow

# ---------------------------------------------------------------------------
# Keybindings
# ---------------------------------------------------------------------------
# Modifiers: cmd, ctrl, option/alt, shift, capslock (hyper), space
# Keys: a-z, 0-9, f1-f20, arrows, return, tab, space, escape, delete,
#        minus/-,  equal/=, leftbracket/[, rightbracket/], semicolon/;,
#        quote/', comma/,, period/., slash//, backslash/\, backtick/`
# Mouse: mouse1-mouse5, with optional modifier (ctrl+mouse4)
# ---------------------------------------------------------------------------
keybindings:
  # --- picker ---
  - combo: "capslock+space"
    action: "app.togglePicker"

  # --- app focus (hyper + number row) ---
  - combo: "capslock+1"
    action: "alias.Safari"
  - combo: "capslock+2"
    action: "alias.Chrome"
  - combo: "capslock+3"
    action: "alias.Zen"
  - combo: "capslock+4"
    action: "alias.IntelliJ"
  - combo: "capslock+5"
    action: "alias.VSCode"
  - combo: "capslock+6"
    action: "alias.Spotify"
  - combo: "capslock+7"
    action: "alias.Notes"
  - combo: "capslock+8"
    action: "alias.Zoom"
  - combo: "capslock+9"
    action: "alias.Telegram"
  - combo: "capslock+0"
    action: "alias.iTerm"

  # --- window management (hyper + letters) ---
  - combo: "capslock+a"
    action: "window.cycleLeft"
  - combo: "capslock+h"
    action: "window.cycleLeft"
  - combo: "capslock+d"
    action: "window.cycleRight"
  - combo: "capslock+l"
    action: "window.cycleRight"
  - combo: "capslock+w"
    action: "window.cycleTop"
  - combo: "capslock+s"
    action: "window.cycleBottom"
  - combo: "capslock+m"
    action: "window.toggleMaximize"
  - combo: "capslock+r"
    action: "window.center"
  - combo: "capslock+p"
    action: "window.focusWindow"       # show focus window picker
  - combo: "capslock+g"
    action: "system.missionControl"    # show all windows and desktops
  - combo: "capslock+backslash"
    action: "window.tileRight"         # tile window to right half
  - combo: "capslock+n"
    action: "window.focusWindow"       # move window to next screen
  - combo: "capslock+minus"
    action: "window.shrinkWidth"       # make window narrower
  - combo: "capslock+equal"
    action: "window.enlargeWidth"      # make window wider

  # --- window focus ---
  - combo: "capslock+leftbracket"
    action: "window.focusWindow"
  - combo: "capslock+comma"
    action: "window.focusWindow"
  - combo: "capslock+rightbracket"
    action: "window.focusWindow"
  - combo: "capslock+period"
    action: "window.focusWindow"

  # --- system ---
  - combo: "capslock+q"
    action: "system.lock"

  # --- app-scoped bindings (only fire when that app is focused) ---
  # - combo: "cmd+k"
  #   action: "app.togglePicker"
  #   app: "com.googlecode.iterm2"
  # - combo: "cmd+shift+p"
  #   action: "app.togglePicker"
  #   app: "com.microsoft.VSCode"

# ---------------------------------------------------------------------------
# Key Remaps
# ---------------------------------------------------------------------------
# Remap key combos to different keys, globally or per-application.
# Only standard modifier+key and tab+key combos are supported as source.
# Omit `app` to remap OS-wide. With `app`, the remap only fires when that
# app is focused; app-specific remaps take priority over global ones.
# ---------------------------------------------------------------------------
keyRemaps:
  # Global remap (applies in all apps)
  # - remaps:
  #     - from: "ctrl+h"
  #       to: "backspace"

  # Per-app remap (only when Safari is focused)
  - app: "com.apple.Safari"
    remaps:
      - from: "cmd+,"
        to: "ctrl+shift+tab"    # previous tab
      - from: "cmd+."
        to: "ctrl+tab"          # next tab

  # - app: "com.microsoft.VSCode"
  #   remaps:
  #     - from: "ctrl+h"
  #       to: "cmd+backspace"
  #     - from: "ctrl+d"
  #       to: "forwarddelete"

# ---------------------------------------------------------------------------
# Mouse Remaps
# ---------------------------------------------------------------------------
# Remap mouse buttons to keyboard combos globally.
# Uses the same mouse button syntax as keybindings (mouse1-mouse5).
# Target must be a standard modifier+key combo.
# ---------------------------------------------------------------------------
mouseRemaps:
  - from: "mouse4"
    to: "cmd+["                    # browser back
  - from: "mouse5"
    to: "cmd+]"                    # browser forward

# ---------------------------------------------------------------------------
# Aliases (action shortcuts with optional pre-filled parameters)
# ---------------------------------------------------------------------------
# Aliases create searchable shortcuts for actions. Two types:
#   - With parameters: creates a new picker entry (e.g. "Safari" launches Safari)
#   - Without parameters: enriches the original action with alias keywords
#     (e.g. "Lock Screen" alias makes system.lock findable by "lock screen")
# Alias actions have IDs like "alias.Safari" for use in keybindings.
# ---------------------------------------------------------------------------
aliases:
  # App-focus shortcuts (bound to hyper + 1-0 above)
  # Use exact per-app action IDs so the alias enriches the existing action
  # (no duplicate entry in picker). The action ID format is:
  # application.app.{bundleID}
  - alias: "Safari"
    action: "application.app.com.apple.Safari"
    icon: "safari"
    keywords: ["browser"]

  - alias: "Chrome"
    action: "application.app.com.google.Chrome"
    icon: "globe"
    keywords: ["browser"]

  - alias: "IntelliJ"
    action: "application.app.com.jetbrains.intellij"
    icon: "hammer"
    keywords: ["editor", "ide", "java"]

  - alias: "VSCode"
    action: "application.app.com.microsoft.VSCode"
    icon: "chevron.left.forwardslash.chevron.right"
    keywords: ["editor", "code"]

  - alias: "Spotify"
    action: "application.app.com.spotify.client"
    icon: "music.note"
    keywords: ["music"]

  - alias: "Notes"
    action: "application.app.com.apple.Notes"
    icon: "note.text"
    keywords: ["notes"]

  - alias: "Zoom"
    action: "application.app.us.zoom.xos"
    icon: "video"
    keywords: ["video", "calls"]

  - alias: "Telegram"
    action: "application.app.ru.keepcoder.Telegram"
    icon: "paperplane"
    keywords: ["messaging", "chat"]

  - alias: "iTerm"
    action: "application.app.com.googlecode.iterm2"
    icon: "terminal"
    keywords: ["terminal", "shell"]

  # Parameterless aliases — enrich original actions with extra keywords
  - alias: "Lock Screen"
    action: "system.lock"
    icon: "lock"
    keywords: ["security", "away"]

  - alias: "Toggle Dark Mode"
    action: "system.toggleAppearance"
    icon: "circle.lefthalf.filled"
    keywords: ["theme", "light", "dark"]

  # Parameterized aliases with query placeholder (creates separate picker entries)
  - alias: "Search GitHub"
    action: "github.searchRepos"
    icon: "magnifyingglass"
    subtitle: "Search GitHub repos..."
    parameters:
      query: "{query}"

  - alias: "Search Spotify"
    action: "spotify.search"
    icon: "music.note"
    subtitle: "Search tracks, albums, artists..."
    parameters:
      query: "{query}"

  # URL aliases — open URLs directly in a browser
  - alias: "Google"
    action: "https://www.google.com/search?q={query}"
    icon: "magnifyingglass"
    subtitle: "Search Google..."
    browser: "chrome"
    parameters:
      query: "{query}"

  # Directory aliases — open folders in Finder
  - alias: "Downloads"
    action: "~/Downloads"
    icon: "arrow.down.circle"
    subtitle: "Open Downloads folder"

  - alias: "Projects"
    action: "~/Projects"
    icon: "folder"
    subtitle: "Open Projects folder"

# ---------------------------------------------------------------------------
# Modules
# ---------------------------------------------------------------------------
modules:

  # --- Window Management ---
  window:
    horizontalStops:
      - { value: 50, unit: percent }
      - { value: 33.33, unit: percent }
      - { value: 66.67, unit: percent }
      - { value: 100, unit: percent }
    verticalStops:
      - { value: 50, unit: percent }
      - { value: 100, unit: percent }
    padding:
      top: 0
      bottom: 0
      left: 0
      right: 0
      gap: 8
    includeMinimized: false
    enlargeShrinkStep:
      value: 10
      unit: percent

  # --- Application Launcher ---
  application:
    showRunningOnly: false
    excludedBundleIDs:
      - "com.apple.Dock"
      - "com.apple.loginwindow"

  # --- Browser Tabs ---
  browser:
    browsers: []               # empty = all running supported browsers
    cacheTTLSeconds: 3.0
    maxResults: 50
    showCloseActions: true

  # --- System Utilities ---
  system:
    screenshotPath: "~/Screenshots"
    enabledActions:
      - lock
      - sleep
      - restart
      - shutdown
      - logout
      - missionControl
      - toggleAppearance
      - autoAppearance
      - emptyTrash
      - screenshotFull
      - screenshotClipboard
      - screenshotInteractive
      - flushDNS
      - purgeMemory

  # --- Theme / Appearance ---
  theme:
    # Uncomment to restrict which actions appear:
    # enabledActions:
    #   - setDark
    #   - setLight
    #   - setAccentColor
    #   - setWallpaper
    #   - vscodeTheme
    #   - jetbrainsTheme
    #   - itermPreset

    # VSCode variants to manage (nil = Code, Code - Insiders, Cursor, Windsurf)
    # vscodeVariants:
    #   "VS Code": "Code"
    #   "Cursor": "Cursor"
    #   "Windsurf": "Windsurf"

    # JetBrains IDEs to manage (nil = all detected)
    # jetbrainsIDEs:
    #   - idea
    #   - webstorm
    #   - goland

    # Custom VSCode theme names for the picker
    # vscodeThemes:
    #   - "One Dark Pro"
    #   - "Dracula"
    #   - "Solarized Dark"
    #   - "Solarized Light"
    #   - "GitHub Dark"
    #   - "Monokai"

    # Custom iTerm color presets
    # itermPresets:
    #   - "Solarized Dark"
    #   - "Tango Dark"
    #   - "Light Background"

    # Theme presets (nil = 3 defaults: Dark Focus, Light Clean, Warm Night)
    # Each preset can set any combination of: appearance, accentColor, wallpaper,
    # vscodeTheme, jetbrainsTheme, itermPreset, githubTheme.
    # githubTheme options: "auto" (follows system), "light", "dark", "dark_dimmed"
    # Requires a github.com tab open in a browser for GitHub theme to apply.
    # presets:
    #   - name: "Dark Focus"
    #     icon: "moon.stars"
    #     subtitle: "Dark mode with muted accent"
    #     appearance: "dark"
    #     accentColor: "Graphite"
    #     vscodeTheme: "Default Dark Modern"
    #     jetbrainsTheme: "Darcula"
    #     itermPreset: "Solarized Dark"
    #     githubTheme: "auto"
    #
    #   - name: "Light Clean"
    #     icon: "sun.max"
    #     subtitle: "Light mode with blue accent"
    #     appearance: "light"
    #     accentColor: "Blue"
    #     vscodeTheme: "Default Light Modern"
    #     jetbrainsTheme: "IntelliJ Light"
    #     itermPreset: "Light Background"
    #     githubTheme: "auto"
    #
    #   - name: "Warm Night"
    #     icon: "flame"
    #     subtitle: "Warm dark theme for night coding"
    #     appearance: "dark"
    #     accentColor: "Orange"
    #     vscodeTheme: "Monokai"
    #     jetbrainsTheme: "Darcula"
    #     itermPreset: "Tango Dark"
    #     githubTheme: "auto"

  # --- Audio Control ---
  audio:
    volumeSteps: [25, 50, 75, 100]
    volumeStep: 10

  # --- Clipboard History ---
  clipboard:
    maxItems: 200
    pollingInterval: 0.5
    showClearAction: true
    pasteOnSelect: true
    excludePatterns:
      - "^ghp_"              # GitHub tokens
      - "^sk-"               # OpenAI API keys
      - "^AKIA"              # AWS access keys

  # --- Spotify ---
  # Get clientId from https://developer.spotify.com/dashboard
  spotify:
    clientId: null            # set to enable Web API search
    maxSearchResults: 10
    searchTypes: [track, album, artist, playlist]
    showNowPlaying: true

  # --- GitHub ---
  # Token: https://github.com/settings/tokens (repo, notifications scopes)
  github:
    token: null               # set to increase rate limit & enable notifications
    defaultOwner: null        # e.g. "myorg" — scopes searches to org by default
    repoOwners: null          # fetch repos from multiple orgs/users: ["org1", "user1"]
    maxResults: 10
    searchTypes: [repo, issue, pr]
    showRepos: true           # list your repos as searchable picker actions
    showNotifications: true

  # --- VSCode / Cursor / Windsurf ---
  vscode:
    maxResults: 20
    showFiles: false
    showRemote: false
    variants:
      "Cursor": "Cursor"
      "Windsurf": "Windsurf"

  # --- iTerm Sessions ---
  iterm:
    maxResults: 20
    showCWD: true
    showJobName: true
    commands:
      "Top": "btop"
      "Lazygit": "lazygit"
      "Lazydocker": "lazydocker"
      "SSH Dev": "ssh user@dev.example.com"

  # --- AI Sessions (Claude Code, Codex) ---
  ai:
    maxResults: 20
    providers:
      - claudeCode
      - claudeDesktop
      - codex
    showLaunchers: true
    terminalApp: "iterm"

  # --- Telegram ---
  telegram:
    showLaunchAction: true
    showSavedMessages: true
    chats:
      - name: "Saved Messages"
        username: "saved"
        type: chat
        icon: "bookmark"

  # --- JetBrains IDEs ---
  jetbrains:
    maxResults: 20
    # enabledIDEs:             # nil = all detected IDEs
    #   - idea
    #   - pycharm
    #   - webstorm
    #   - goland
    #   - rustrover
    # IDE tags: idea, pycharm, webstorm, datagrip, goland,
    #           rustrover, clion, rider, phpstorm, rubymine, studio

  # --- Meeting Prep ---
  meetingPrep:
    prepWindowMinutes: 15       # Show prep actions N minutes before meeting
    autoJoinVideo: false        # Auto-join video call when preparing
    # hideApps:                 # Bundle IDs of apps to minimize (if set, only these are hidden)
    #   - "com.tinyspeck.slackmacgap"
    #   - "com.hnc.Discord"
    #   - "com.apple.mail"
    # keepApps:                 # Bundle IDs to keep visible (if set, everything else is hidden)
    #   - "us.zoom.xos"
    #   - "com.google.Chrome"

  # --- Calendar Events ---
  calendar:
    lookaheadHours: 24
    lookbehindMinutes: 30
    showAllDayEvents: false
    showDeclinedEvents: false
    showOpenCalendarAction: true
    # excludedCalendars:
    #   - "Birthdays"
    #   - "US Holidays"
    # includedCalendars:          # if set, only these calendars are shown
    #   - "Work"
    #   - "Personal"

  # --- Zoom Meetings ---
  zoom:
    showStartMeeting: true
    showJoinAction: true
    showLaunchAction: true
    # personalMeetingId: "123 456 7890"   # for "Start My Meeting" action
    meetings:
      - name: "Weekly Standup"
        meetingId: "123 456 7890"
        password: "abc123"
        keywords: ["standup", "daily"]
      # - name: "Team Retro"
      #   link: "https://zoom.us/j/1234567890?pwd=xyz"
      #   keywords: ["retro", "sprint"]

  # --- Bookmarks & History ---
  # Requires Full Disk Access permission for reading Safari bookmarks/history.
  # Chromium bookmarks/history are read from Application Support (no FDA needed).
  bookmark:
    browsers: []               # empty = all installed Safari + Chromium browsers
    maxBookmarks: 100          # max bookmark actions (0 = unlimited)
    maxVisited: 30             # max most-visited history entries
    showMostVisited: true      # show most-visited URL actions
    minVisitCount: 3           # minimum visits to include a history entry
    cacheTTLSeconds: 300       # re-read bookmarks/history every 5 minutes

  # --- Self (Vibeshed meta-actions) ---
  self:
    enabledActions:
      - openConfig
      - openConfigDir
      - reloadConfig
      - moduleStatus
      - openLogs
      - quit

# ---------------------------------------------------------------------------
# URL Routing (default browser replacement)
# ---------------------------------------------------------------------------
# When registerAsDefaultBrowser is true, the app becomes the system default
# browser. URLs matching a rule open directly in the configured browser/profile.
# URLs that don't match any rule show a picker with installed browsers so you
# can choose where to open the link. Chromium browser profiles are discovered
# automatically.
#
# Pattern syntax:
#   Glob:  *.example.com/*
#   Regex: /pattern/
# Browser names: safari, chrome, firefox, brave, edge, arc, orion, vivaldi, opera
# ---------------------------------------------------------------------------
urlRouting:
  registerAsDefaultBrowser: true
  defaultBrowser: "safari"    # Pre-selected in the browser chooser picker
  # defaultProfile: "Default"  # Optional: default Chromium profile for rules without explicit profile
  rules:
    # URLs matching rules open directly without showing the chooser
    - pattern: "*.github.com/*"
      browser: "chrome"
      profile: "Work"          # Open in Chrome's "Work" profile (Chromium only)
    - pattern: "*.figma.com/*"
      browser: "chrome"

    # Google services in Chrome
    - pattern: "/.*\\.google\\.com/"
      browser: "chrome"
    - pattern: "*.googleapis.com/*"
      browser: "chrome"

    # Profile names are the directory names from Chromium's Local State file,
    # e.g. "Default", "Profile 1", "Profile 2", or custom names.
    # Only Chromium browsers (Chrome, Brave, Edge, Vivaldi, Opera) support profiles.
    # Non-Chromium browsers ignore the profile field.

    # Everything else shows the browser chooser picker
